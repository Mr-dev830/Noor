<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Noor ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
font-family:Poppins;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* Background image */

.bg{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:url("noor.jpg") center/cover no-repeat;

filter:blur(10px) brightness(0.6);

z-index:-2;

}

/* dark overlay */

.overlay{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:linear-gradient(
rgba(0,0,0,0.3),
rgba(255,0,80,0.2)
);

z-index:-1;

}

/* glass card */

.card{

backdrop-filter:blur(20px);

background:rgba(255,255,255,0.08);

padding:45px;

border-radius:25px;

text-align:center;

width:340px;

box-shadow:
0 20px 50px rgba(0,0,0,0.5),
0 0 30px rgba(255,0,100,0.3);

animation:fadeIn 2s ease;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(40px)
}

to{
opacity:1;
transform:translateY(0)
}

}

h1{

font-family:"Dancing Script";

font-size:42px;

margin-bottom:10px;

}

.subtitle{

opacity:0.9;

font-style:italic;

margin-bottom:30px;

}

/* buttons */

button{

padding:12px 28px;

font-size:18px;

border:none;

border-radius:40px;

cursor:pointer;

transition:0.3s;

}

/* yes button */

#yesBtn{

background:linear-gradient(45deg,#ff003c,#ff5f6d);

color:white;

box-shadow:0 0 20px rgba(255,0,80,0.9);

animation:pulse 2s infinite;

}

@keyframes pulse{

0%{box-shadow:0 0 15px red}
50%{box-shadow:0 0 35px red}
100%{box-shadow:0 0 15px red}

}

#yesBtn:hover{

transform:scale(1.1);

}

/* no button */

#noBtn{

background:white;

color:red;

border:2px solid red;

margin-left:12px;

}

/* hearts */

.heart{

position:absolute;

font-size:20px;

animation:float 6s linear infinite;

opacity:0.8;

}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0
}

50%{
opacity:1
}

100%{
transform:translateY(-10vh);
opacity:0
}

}

/* celebration */

#celebration{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:linear-gradient(#ff6a88,#ff99ac);

justify-content:center;
align-items:center;
flex-direction:column;

font-size:32px;

text-align:center;

animation:fadeIn 1s;

}

.confetti{

position:absolute;

width:8px;
height:8px;

animation:fall 3s linear infinite;

}

@keyframes fall{

0%{
transform:translateY(-10vh)
}

100%{
transform:translateY(110vh)
}

}

</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="card" id="main">

<h1>Will You Be My Valentine, Noor?</h1>

<p class="subtitle">
Out of billions of people, my heart chose you.
</p>

<button id="yesBtn">YES ❤️</button>
<button id="noBtn">No</button>

</div>

<div id="celebration">

<h1>Yayyyy ❤️</h1>

<p>
I knew you'd say yes… you just made me the happiest person alive ❤️
</p>

</div>

<script>

/* runaway button */

const noBtn=document.getElementById("noBtn")

noBtn.onclick=()=>{

let x=Math.random()*window.innerWidth
let y=Math.random()*window.innerHeight

noBtn.style.position="fixed"
noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

}

/* yes click */

document.getElementById("yesBtn").onclick=()=>{

document.getElementById("main").style.display="none"

let celebration=document.getElementById("celebration")

celebration.style.display="flex"

/* confetti */

for(let i=0;i<120;i++){

let conf=document.createElement("div")

conf.className="confetti"

conf.style.left=Math.random()*100+"vw"

conf.style.backgroundColor=
`hsl(${Math.random()*360},100%,50%)`

conf.style.animationDuration=
Math.random()*3+2+"s"

celebration.appendChild(conf)

}

}

/* floating hearts */

function heart(){

let h=document.createElement("div")

h.className="heart"

h.innerHTML="❤️"

h.style.left=Math.random()*100+"vw"

document.body.appendChild(h)

setTimeout(()=>h.remove(),6000)

}

setInterval(heart,500)

</script>

</body>
</html>
