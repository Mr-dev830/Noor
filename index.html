<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Noor ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ffb6c1,#ff6f91);
overflow:hidden;
color:white;
}

.container{
z-index:2;
}

img{
width:220px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
font-family:'Dancing Script',cursive;
font-size:3em;
margin:10px 0;
}

.subtitle{
font-style:italic;
margin-bottom:20px;
}

.buttons{
display:flex;
gap:40px;
justify-content:center;
}

button{
padding:12px 28px;
font-size:18px;
border:none;
cursor:pointer;
border-radius:30px;
transition:0.3s;
}

#yesBtn{
background:red;
color:white;
box-shadow:0 0 10px red;
}

#yesBtn:hover{
transform:scale(1.1);
box-shadow:0 0 20px red;
}

#noBtn{
background:white;
color:red;
border:2px solid red;
position:relative;
}

.heart{
position:absolute;
bottom:-20px;
font-size:20px;
animation:float 6s linear infinite;
opacity:0.8;
}

@keyframes float{
0%{transform:translateY(0);opacity:0}
50%{opacity:1}
100%{transform:translateY(-110vh);opacity:0}
}

#celebration{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ff6f91;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:2em;
z-index:5;
}

.confetti{
position:absolute;
width:8px;
height:8px;
background:yellow;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="hawayein.mp3" type="audio/mpeg">
</audio>

<div class="container" id="main">

<img src="Noor.jpg">

<h1>Will You Be My Valentine, Noor?</h1>

<div class="subtitle">
Out of billions of people, my heart chose you.
</div>

<div class="buttons">
<button id="yesBtn">YES ❤️</button>
<button id="noBtn">No</button>
</div>

</div>

<div id="celebration">
<h1>Yayyyy! ❤️</h1>
<p>I knew you'd say yes… you just made me the happiest person alive ❤️</p>
</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

const messages = [
"Nope, not an option!",
"Try again!",
"You sure about that?",
"Not happening!",
"Think again!"
];

noBtn.addEventListener("click",()=>{
let x=Math.random()*window.innerWidth-100;
let y=Math.random()*window.innerHeight-50;

noBtn.style.position="fixed";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

alert(messages[Math.floor(Math.random()*messages.length)]);
});

yesBtn.addEventListener("click",()=>{

document.getElementById("main").style.display="none";

let celebration=document.getElementById("celebration");
celebration.style.display="flex";

for(let i=0;i<120;i++){

let conf=document.createElement("div");
conf.className="confetti";

conf.style.left=Math.random()*100+"vw";
conf.style.backgroundColor=
`hsl(${Math.random()*360},100%,50%)`;

conf.style.animationDuration=
Math.random()*3+2+"s";

celebration.appendChild(conf);
}

});

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=Math.random()*20+20+"px";
heart.style.animationDuration=Math.random()*3+4+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),7000);

}

setInterval(createHeart,400);

</script>

</body>
</html>
